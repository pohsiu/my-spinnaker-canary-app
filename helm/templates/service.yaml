apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ .Values.track }}
  labels:
    app: {{ .Values.appName }}
    track: {{ .Values.track }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.appName }}
    track: {{ .Values.track }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
