name: Build and Push (main)

# Builds and pushes an image on every push to main, tagged with the
# commit SHA. Does NOT deploy anything — spinnaker/dinghyfile's existing
# Docker trigger picks up the new tag from here and handles canary
# analysis + promotion. This workflow's job ends at the registry push.

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "apps/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-and-push.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/my-spinnaker-canary-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
